name: push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: registry.suse.com/bci/bci-base:latest
    steps:
      - name: Install Dependencies
        run: zypper --non-interactive in curl tar gzip git make

      - name: Checkout current repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect new chart version
        id: detect_new_charts
        run: |
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial push, skipping chart detection."
            echo "new_charts=" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_CHARTS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^charts/(rancher-monitoring|rancher-logging)/[^/]*/Chart.yaml$' | sed -e 's|charts/\(.*\)/\(.*\)/Chart.yaml|\1/\2|' | tr '\n' ' ')
          echo "new_charts=${NEW_CHARTS}" >> $GITHUB_OUTPUT

      - name: Update Downstream Chart
        if: steps.detect_new_charts.outputs.new_charts != ''
        env:
          NEW_CHARTS: ${{ steps.detect_new_charts.outputs.new_charts }}
          GH_TOKEN: ${{ secrets.CHARTS_REPO_PAT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -eux

          if [ -z "$NEW_CHARTS" ]; then
            echo "No new charts detected. Exiting."
            exit 0
          fi

          curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

          git clone https://oauth2:${GH_TOKEN}@github.com/diogoasouza/charts.git charts-repo
          cd charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout dev-v2.13

          BRANCH_NAME="bot/update-charts-$(date +%s)"
          git checkout -b $BRANCH_NAME

          declare -A new_package_versions
          for chart_full_version in $NEW_CHARTS; do
            CHART_NAME=$(echo $chart_full_version | cut -d'/' -f1)
            CHART_VERSION=$(echo $chart_full_version | cut -d'/' -f2)

            PACKAGE_PATH=$(yq e ".packages.$CHART_NAME.package" ../charts-config.yaml)
            PACKAGE_YAML_PATH="packages/$PACKAGE_PATH/package.yaml"

            if [ ! -f "$PACKAGE_YAML_PATH" ]; then
              echo "package.yaml not found at $PACKAGE_YAML_PATH"
              continue
            fi

            yq e -i ".subdirectory = \"charts/$CHART_NAME/$CHART_VERSION\"" "$PACKAGE_YAML_PATH"
            yq e -i ".commit = \"$COMMIT_SHA\"" "$PACKAGE_YAML_PATH"

            CURRENT_VERSION=$(yq e '.version' "$PACKAGE_YAML_PATH")
            if [[ "$CURRENT_VERSION" == *"-rc."* ]]; then
              BASE_VERSION=$(echo $CURRENT_VERSION | cut -d'-' -f1)
              RC_PART=$(echo $CURRENT_VERSION | cut -d'-' -f2)
              RC_NUMBER=$(echo $RC_PART | cut -d'.' -f2)
              NEW_RC_NUMBER=$((RC_NUMBER + 1))
              NEW_VERSION="$BASE_VERSION-rc.$NEW_RC_NUMBER"
            else
              MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
              MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
              PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH-rc.1"
            fi
            yq e -i ".version = \"$NEW_VERSION\"" "$PACKAGE_YAML_PATH"
            new_package_versions[$CHART_NAME]=$NEW_VERSION

            if yq e '.additionalCharts | has(0)' "$PACKAGE_YAML_PATH" &> /dev/null; then
                CRD_CHART_NAME="${CHART_NAME}-crd"
                CRD_CHART_VERSION="$CHART_VERSION"
                yq e -i '.additionalCharts[0].upstreamOptions.subdirectory = "charts/'"$CRD_CHART_NAME"'/'"$CRD_CHART_VERSION"'"' "$PACKAGE_YAML_PATH"
                yq e -i '.additionalCharts[0].upstreamOptions.commit = "'"$COMMIT_SHA"'"' "$PACKAGE_YAML_PATH"
            fi
          done

          if ! git diff --quiet; then
            git add .
            git commit -m "chore(charts): Update package.yaml"
          else
            echo "No package.yaml changes to commit. Exiting."
            exit 0
          fi

          for chart_full_version in $NEW_CHARTS; do
            CHART_NAME=$(echo $chart_full_version | cut -d'/' -f1)
            PACKAGE_PATH=$(yq e ".packages.$CHART_NAME.package" ../charts-config.yaml)
            make charts PACKAGE="$PACKAGE_PATH"
          done

          if ! git diff --quiet; then
            git add .
            git commit -m "feat(charts): Generate new chart assets"
          else
            echo "No generated chart changes to commit."
          fi

          for chart_full_version in $NEW_CHARTS; do
            CHART_NAME=$(echo $chart_full_version | cut -d'/' -f1)
            CHART_VERSION=$(echo $chart_full_version | cut -d'/' -f2)
            NEW_PACKAGE_VERSION=${new_package_versions[$CHART_NAME]}
            FULL_VERSION="${NEW_PACKAGE_VERSION}+up${CHART_VERSION}"

            yq e -i ".${CHART_NAME} |= [\"${FULL_VERSION}\"] + ." "release.yaml"

            CRD_CHART_NAME="${CHART_NAME}-crd"
            if yq e ".${CRD_CHART_NAME}" "release.yaml" &> /dev/null; then
                yq e -i ".${CRD_CHART_NAME} |= [\"${FULL_VERSION}\"] + ." "release.yaml"
            fi
          done

          if ! git diff --quiet; then
            git add release.yaml
            git commit -m "chore(charts): Update release.yaml"
          fi

          git push origin $BRANCH_NAME
          echo "Changes pushed to branch $BRANCH_NAME"
          echo "Next step is to create a Pull Request."
