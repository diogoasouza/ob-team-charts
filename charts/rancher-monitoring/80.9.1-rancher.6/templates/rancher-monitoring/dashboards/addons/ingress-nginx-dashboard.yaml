{{- if and (include "rancher-monitoring.dashboardArtifacts.enabled" .) .Values.dashboardArtifacts.groups.ingressNginx }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  name: {{ printf "%s-%s" (include "rancher-monitoring.fullname" .) "ingress-nginx" | trunc 63 | trimSuffix "-" }}
  {{- with (include "rancher-monitoring.dashboardAnnotations" .) }}
  annotations:
{{ . | indent 4 }}
  {{- end }}
  labels:
{{ include "rancher-monitoring.dashboardLabels" . | indent 4 }}
data:
{{ (.Files.Glob "files/ingress-nginx/*").AsConfig | indent 2 }}
{{- end }}
