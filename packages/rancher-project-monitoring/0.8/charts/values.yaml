# Default values for the rancher-project-monitoring compatibility prototype.

nameOverride: rancher-project-monitoring
namespaceOverride: ""
kubeTargetVersionOverride: ""
kubeVersionOverride: ""
fullnameOverride: ""
commonLabels: {}

# External endpoint metadata published for Rancher consumers through the
# dashboard-values ConfigMap.
dashboardIntegration:
  grafanaURL: ""
  prometheusURL: ""
  alertmanagerURL: ""

global:
  cattle:
    systemDefaultRegistry: ""
    projectNamespaces: []
  rbac:
    create: true
    userRoles:
      create: true
      aggregateToDefaultRoles: true

grafana:
  enabled: false
  namespaceOverride: ""
  forceDeployDashboards: true
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      label: grafana_dashboard
      labelValue: "1"
      annotations: {}

prometheus:
  enabled: false
  service:
    port: 9090
  ingress:
    enabled: false
    hosts: []
  prometheusSpec:
    externalUrl: ""
    routePrefix: /
    remoteWriteDashboards: false

alertmanager:
  enabled: false
  service:
    port: 9093
  ingress:
    enabled: false
    hosts: []
  alertmanagerSpec:
    externalUrl: ""
    routePrefix: /

federate:
  enabled: false
