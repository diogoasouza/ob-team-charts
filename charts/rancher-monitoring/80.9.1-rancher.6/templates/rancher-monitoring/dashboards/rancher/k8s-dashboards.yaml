{{- if and (include "rancher-monitoring.dashboardArtifacts.enabled" .) .Values.dashboardArtifacts.groups.rancherCore }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  name: rancher-default-dashboards-k8s
  {{- with (include "rancher-monitoring.dashboardAnnotations" .) }}
  annotations:
{{ . | indent 4 }}
  {{- end }}
  labels:
{{ include "rancher-monitoring.dashboardLabels" . | indent 4 }}
data:
{{ (.Files.Glob "files/rancher/k8s/*").AsConfig | indent 2 }}
{{- end }}
