{{- range $name, $target := .Values.targets }}
{{- $cfg := include "rancher-pushprox.targetConfig" (dict "root" $ "target" $target) | fromYaml }}
{{- if and $target.enabled $cfg.clients.enabled }}
{{- $needsClusterRole := or $.Values.global.cattle.psp.enabled (and $cfg.clients.https.enabled $cfg.clients.https.useServiceAccountCredentials) (not (empty $cfg.clients.rbac.additionalRules)) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
  namespace: {{ include "rancher-pushprox.targetNamespace" (dict "root" $ "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.clientLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
{{- if $needsClusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.clientLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
rules:
{{- if $.Values.global.cattle.psp.enabled }}
  - apiGroups:
      - policy
    resources:
      - podsecuritypolicies
    verbs:
      - use
    resourceNames:
      - {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
{{- end }}
{{- if and $cfg.clients.https.enabled $cfg.clients.https.useServiceAccountCredentials }}
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
{{- with $cfg.clients.rbac.additionalRules }}
{{ toYaml . | indent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.clientLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
    namespace: {{ include "rancher-pushprox.targetNamespace" (dict "root" $ "cfg" $cfg) }}
{{- end }}
{{- if and $cfg.clients.https.enabled $cfg.clients.https.useServiceAccountCredentials }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: {{ include "rancher-pushprox.clientTokenName" (dict "root" $ "name" $name "cfg" $cfg) }}
  namespace: {{ include "rancher-pushprox.targetNamespace" (dict "root" $ "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.clientLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
{{- end }}
{{- if $.Values.global.cattle.psp.enabled }}
---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: {{ include "rancher-pushprox.clientName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.clientLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
spec:
  privileged: false
  hostNetwork: true
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: RunAsAny
  seLinux:
    rule: RunAsAny
{{- if and $cfg.clients.https.enabled $cfg.clients.https.certDir $.Values.global.seLinux.enabled $cfg.clients.https.seLinuxOptions }}
    seLinuxOptions:
{{ toYaml $cfg.clients.https.seLinuxOptions | indent 6 }}
{{- end }}
  supplementalGroups:
    rule: MustRunAs
    ranges:
      - min: 0
        max: 65535
  fsGroup:
    rule: MustRunAs
    ranges:
      - min: 0
        max: 65535
  readOnlyRootFilesystem: false
  volumes:
    - secret
{{- if and $cfg.clients.https.enabled $cfg.clients.https.certDir }}
    - emptyDir
    - hostPath
  allowedHostPaths:
    - pathPrefix: {{ $cfg.clients.https.certDir }}
      readOnly: true
{{- end }}
{{- end }}
{{- end }}
{{- end }}
