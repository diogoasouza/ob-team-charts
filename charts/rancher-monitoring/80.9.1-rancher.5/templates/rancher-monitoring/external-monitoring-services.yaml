{{- if .Values.dashboardIntegration.grafana.host }}
---
apiVersion: v1
kind: Service
metadata:
  name: rancher-monitoring-grafana
  namespace: {{ include "rancher-monitoring.namespace" . }}
  labels:
{{ include "rancher-monitoring.labels" . | indent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.dashboardIntegration.grafana.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: rancher-monitoring-grafana
  namespace: {{ include "rancher-monitoring.namespace" . }}
  labels:
{{ include "rancher-monitoring.labels" . | indent 4 }}
subsets:
  - addresses:
      - ip: {{ .Values.dashboardIntegration.grafana.host | quote }}
    ports:
      - port: {{ .Values.dashboardIntegration.grafana.port }}
        protocol: TCP
{{- end }}
