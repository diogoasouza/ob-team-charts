{{- if and (include "rancher-monitoring.dashboardArtifacts.enabled" .) .Values.dashboardArtifacts.groups.logging.fluentd }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  name: rancher-fluentd-dashboard
  {{- with (include "rancher-monitoring.dashboardAnnotations" .) }}
  annotations:
{{ . | indent 4 }}
  {{- end }}
  labels:
{{ include "rancher-monitoring.dashboardLabels" . | indent 4 }}
data:
{{ (.Files.Glob "files/rancher/logging/fluentd.json").AsConfig | indent 2 }}
{{- end }}
