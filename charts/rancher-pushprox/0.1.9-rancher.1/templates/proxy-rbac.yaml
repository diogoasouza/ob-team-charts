{{- range $name, $target := .Values.targets }}
{{- $cfg := include "rancher-pushprox.targetConfig" (dict "root" $ "target" $target) | fromYaml }}
{{- if and $target.enabled $cfg.proxy.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
  namespace: {{ include "rancher-pushprox.targetNamespace" (dict "root" $ "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.proxyLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
{{- if $.Values.global.cattle.psp.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.proxyLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
rules:
  - apiGroups:
      - policy
    resources:
      - podsecuritypolicies
    verbs:
      - use
    resourceNames:
      - {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.proxyLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
    namespace: {{ include "rancher-pushprox.targetNamespace" (dict "root" $ "cfg" $cfg) }}
---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: {{ include "rancher-pushprox.proxyName" (dict "root" $ "name" $name "cfg" $cfg) }}
  labels:
{{ include "rancher-pushprox.proxyLabels" (dict "root" $ "name" $name "cfg" $cfg) | indent 4 }}
spec:
  privileged: false
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: MustRunAsNonRoot
  seLinux:
    rule: RunAsAny
  supplementalGroups:
    rule: MustRunAs
    ranges:
      - min: 1
        max: 65535
  fsGroup:
    rule: MustRunAs
    ranges:
      - min: 1
        max: 65535
  readOnlyRootFilesystem: false
  volumes:
    - secret
{{- end }}
{{- end }}
{{- end }}
