{{- if and .Values.global.rbac.create .Values.global.rbac.userRoles.create (include "rancher-monitoring.dashboardArtifacts.enabled" .) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-dashboard-admin
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-dashboard-edit
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-dashboard-view
  namespace: {{ include "rancher-monitoring.dashboardNamespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
{{- end }}
